<!DOCTYPE html>
<html>

<head>

<title>Vehify - Official Scanner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="scanner-page">

<div class="scanner-container">

<h1 class="vehify-title">VEHIFY</h1>
<h2>Official Verification Panel</h2>


<!-- Officer ID Section -->

<div class="card">

<h3>Officer Verification</h3>

<input 
id="officerId" 
type="text" 
placeholder="Enter Officer ID"
/>

</div>


<!-- Scan Button -->

<button class="primary" onclick="scanVehicle()">
SCAN VEHICLE
</button>


<!-- Scan Animation -->

<div class="scan-ring"></div>


<!-- Scan Result Area -->

<div class="card" id="resultArea">

<p>Scan a vehicle to view verification details.</p>

</div>


<!-- Navigation Buttons -->

<div>

<a href="history.html">
<button>View Vehicle History</button>
</a>

<a href="index.html">
<button>Back Home</button>
</a>

</div>


</div>


<script src="js/data.js"></script>
<script src="js/logic.js"></script>
<script src="js/scanner.js"></script>

</body>

</html>
